<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"
      rel="stylesheet"
    />

    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap");

      :root {
        --text-dark: #0f172a;
        --text-light: #475569;
        --extra-light: #f2f2f2;
        --white: #ffffff;
        --max-width: 1200px;
        --gradient: linear-gradient(to bottom, #2563eb);
      }

      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      .btn {
        padding: 0.75rem 1.5rem;
        outline: none;
        border: none;
        font-size: 1rem;
        color: var(--white);
        background-color: #2563eb;
        white-space: nowrap;
        border-radius: 4px;
        transition: 0.3s;
        cursor: pointer;
      }

      .btn:hover {
        background-color: white;
        color: #2563eb;
      }

      a {
        text-decoration: none;
        transition: 0.3s;
      }

      ul {
        list-style: none;
      }

      html,
      body {
        scroll-behavior: smooth;
      }

      body {
        font-family: "Mulish", sans-serif;
      }

      /* Heading Style */
      .heading {
        text-align: center;
        font-size: 2.5rem;
        color: var(--text-dark);
        margin-bottom: 2rem;
        padding-top: 6rem;
        /* Add padding to avoid being hidden by the fixed navbar */
      }

      .heading span {
        color: #2563eb;
      }

      header {
        position: relative;
      }

      header::before {
        position: absolute;
        content: "";
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
      }

      nav {
        position: fixed;
        isolation: isolate;
        width: 100%;
        z-index: 9;
      }

      .nav__header {
        padding: 1rem;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color: #2563eb;
      }

      .nav__logo a {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--white);
      }

      .nav__menu__btn {
        font-size: 1.5rem;
        color: var(--white);
        cursor: pointer;
      }

      .nav__links {
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        padding: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 2rem;
        background-color: #2563eb;
        transition: 0.5s;
        z-index: -1;
        transform: translateY(-100%);
      }

      .nav__links.open {
        transform: translateY(0);
      }

      .nav__links a {
        font-weight: 700;
        color: var(--white);
      }

      .nav__links .btn {
        padding: 0;
        background-color: transparent;
      }

      .nav__btns {
        display: none;
      }

      /* ================= Login & Signup form ================= */

      /* Overlay */
      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s ease;
        z-index: 1000;
      }

      .overlay.active {
        opacity: 1;
        pointer-events: auto;
      }

      /* Modal */
      .modal {
        background: #f8fafc;
        padding: 40px;
        border-radius: 16px;
        width: 350px;
        max-width: 90%;
        transform: scale(0.7) translateY(50px);
        opacity: 0;
        transition: all 0.4s ease;
      }

      .overlay.active .modal {
        transform: scale(1) translateY(0);
        opacity: 1;
      }

      .modal h2 {
        margin-bottom: 20px;
        text-align: center;
        color: #1e3a8a;
      }

      .form-group {
        margin-bottom: 15px;
      }

      .form-group input {
        width: 100%;
        padding: 12px;
        border: none;
        border-bottom: 2px solid #cbd5e1;
        outline: none;
        background: transparent;
        font-size: 15px;
        transition: 0.3s;
      }

      .form-group input:focus {
        border-color: #2563eb;
      }

      .modal button.submit-btn {
        width: 100%;
        margin-top: 10px;
        background: #2563eb;
        color: #fff;
        border-radius: 8px;
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        margin: 10px;
        transition: 0.3s;
        font-weight: 600;
      }

      .modal button.submit-btn:hover {
        background: #1e3a8a;
        color: #fff;
      }

      .toggle-text {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
        color: #555;
      }

      .toggle-text span {
        color: #2563eb;
        cursor: pointer;
        font-weight: 600;
      }

      /* Ends */

      @media (width > 768px) {
        header::before {
          height: calc(100% - 4rem);
        }

        nav {
          position: static;
          padding-block: 2rem;
          padding-inline: 1rem;
          max-width: var(--max-width);
          margin-inline: auto;
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 2rem;
        }

        .nav__header {
          flex: 1;
          padding: 0;
          background-color: transparent;
        }

        .nav__logo a {
          font-weight: 800;
          color: var(--text-dark);
        }

        .nav__menu__btn {
          display: none;
        }

        .nav__links {
          position: static;
          padding: 0;
          width: fit-content;
          flex-direction: row;
          background-color: transparent;
          transform: none;
        }

        .nav__links a {
          padding-block: 5px;
          color: var(--text-dark);
          border-bottom: 2px solid transparent;
        }

        .nav__links a:hover {
          border-color: var(--primary-color);
        }

        .nav__links__btn {
          display: none;
        }

        .nav__btns {
          display: flex;
          flex: 1;
          align-items: center;
          justify-content: flex-end;
        }

        .nav__btns .btn__primary {
          color: var(--text-dark);
          background-color: transparent;
        }
      }

      /* ==== NEW: Contact Section Styles ==== */
      .contact {
        /* padding: 2rem 1rem; */
        max-width: var(--max-width);
        margin: auto;
      }

      .contact-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
        align-items: center;
      }

      .contact-form-container,
      .map-container {
        /* Animation */
        opacity: 0;
        transform: translateY(30px);
        animation: fadeInUp 0.8s forwards;
      }

      .map-container {
        animation-delay: 0.2s;
        /* Stagger the animation */
      }

      .contact-form-container form {
        width: 100%;
        padding: 2rem;
        border: 1px solid #ddd;
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
        border-radius: 8px;
        background-color: var(--white);
      }

      .contact-form-container h3 {
        font-size: 2rem;
        padding-bottom: 1rem;
        color: #10221b;
        text-align: center;
      }

      .contact-form-container .inputBox {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 1rem;
      }

      .contact-form-container .inputBox input {
        width: 100%;
      }

      @media (min-width: 768px) {
        .contact-form-container .inputBox input {
          width: 48%;
          /* Side-by-side on larger screens */
        }
      }

      .contact-form-container .inputBox input,
      .contact-form-container textarea {
        border: 1px solid #ccc;
        padding: 1rem 1.2rem;
        border-radius: 0.5rem;
        font-size: 1rem;
        color: #10221b;
        text-transform: none;
        margin: 0.5rem 0;
        width: 100%;
        transition: border-color 0.3s;
      }

      .contact-form-container .inputBox input:focus,
      .contact-form-container textarea:focus {
        outline: none;
        border-color: #2563eb;
      }

      .contact-form-container textarea {
        height: 10rem;
        resize: vertical;
      }

      .map-container iframe {
        width: 100%;
        height: 100%;
        min-height: 450px;
        /* Ensure map has a good height */
        border-radius: 8px;
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
        border: 1px solid #ddd;
      }

      /* Responsive layout for contact section */
      @media (max-width: 992px) {
        .contact-container {
          grid-template-columns: 1fr;
          /* Stack on smaller screens */
        }
      }

      /* Animation keyframes */
      @keyframes fadeInUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ==== END: Contact Section Styles ==== */

      /* Footer section starts  */
      footer {
        position: relative;
        bottom: 0;
        width: 100%;
        padding: 40px 0;
        margin-top: 4rem;
        /* Add space above the footer */
        background-color: #2563eb;
      }

      .footer .social {
        text-align: center;
        padding-bottom: 25px;
        color: white;
      }

      .footer .social a {
        font-size: 24px;
        color: white;
        width: 40px;
        height: 40px;
        line-height: 38px;
        display: inline-block;
        text-align: center;
        border-radius: 50%;
        margin: 0 8px;
        box-shadow: inset 0 0 10px black, 0 0 10px black;
        transition: 0.3s ease;
        border: 2px solid #ffffff;
      }

      .footer .social a:hover {
        box-shadow: inset 0 0 10px #ffffff, 0 0 10px #ffffff;
        transform: scale(1.2) translateY(-10px);
        color: #ffffff;
        border: 2px solid #ffffff;
      }

      .footer ul {
        margin-top: 0;
        padding: 0;
        font-size: 18px;
        line-height: 1.6;
        margin-bottom: 0;
        text-align: center;
      }

      .footer ul li a {
        color: white;
        border-bottom: 3px solid transparent;
        transition: 0.3s ease;
      }

      .footer ul li a:hover {
        border-bottom: 3px solid #ffffff;
      }

      .footer ul li {
        display: inline-block;
        padding: 0 15px;
      }

      .footer .copyright {
        margin-top: 15px;
        text-align: center;
        font-size: 12px;
        color: white;
      }

      /* Media queries for footer */
      @media (max-width: 768px) {
        .footer ul li {
          display: block;
          margin: 10px 0;
        }
      }

      /* ========== Custom Notification Styles ========== */
      .custom-notification {
        position: fixed;
        top: 20px;
        right: 20px;
        background: white;
        padding: 16px 20px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 300px;
        max-width: 400px;
        z-index: 10000;
        transform: translateX(450px);
        opacity: 0;
        transition: all 0.3s ease;
      }

      .custom-notification.show {
        transform: translateX(0);
        opacity: 1;
      }

      .custom-notification i {
        font-size: 24px;
        flex-shrink: 0;
      }

      .custom-notification.success {
        border-left: 4px solid #2563eb;
      }

      .custom-notification.success i {
        color: #2563eb;
      }

      .custom-notification.error {
        border-left: 4px solid #ef4444;
      }

      .custom-notification.error i {
        color: #ef4444;
      }

      .custom-notification span {
        flex: 1;
        font-size: 15px;
        color: #1e293b;
        font-weight: 500;
        line-height: 1.4;
      }

      .custom-notification .notification-close {
        background: transparent;
        border: none;
        cursor: pointer;
        padding: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #64748b;
        transition: color 0.2s;
        flex-shrink: 0;
      }

      .custom-notification .notification-close:hover {
        color: #1e293b;
      }

      .custom-notification .notification-close i {
        font-size: 20px;
      }

      /* Mobile responsive for notifications */
      @media (max-width: 768px) {
        .custom-notification {
          top: 10px;
          right: 10px;
          left: 10px;
          min-width: auto;
          max-width: none;
          transform: translateY(-150px);
          padding: 14px 16px;
        }

        .custom-notification.show {
          transform: translateY(0);
        }

        .custom-notification span {
          font-size: 14px;
        }

        .custom-notification i {
          font-size: 20px;
        }
      }

      @media (max-width: 480px) {
        .custom-notification {
          padding: 12px 14px;
          gap: 10px;
        }

        .custom-notification span {
          font-size: 13px;
        }
      }
    </style>
    <title>PrimeRides | Contact Us</title>
  </head>

  <body>
    <header>
      <nav>
        <div class="nav__header">
          <div class="nav__logo">
            <a href="#">PrimeRides</a>
          </div>
          <div class="nav__menu__btn" id="menu-btn">
            <i class="ri-menu-line"></i>
          </div>
        </div>

        <ul class="nav__links" id="nav-links">
          <li><a href="index.html#home">Home</a></li>
          <li><a href="index.html#rent">Rent</a></li>
          <li><a href="index.html#services">Services</a></li>
          <li><a href="index.html#ride">Ride</a></li>
          <li><a href="contact.html">Contact</a></li>
          <!-- Dynamic Auth Buttons for Mobile will be injected here -->
        </ul>

        <div class="nav__btns">
          <!-- Dynamic Auth Buttons for Desktop will be injected here -->
        </div>
      </nav>
    </header>

    <div class="overlay" id="overlay">
      <div class="modal" id="modal"></div>
    </div>

    <section class="contact" id="contact">
      <h1 class="heading"><span>Contact</span> Us</h1>
      <div class="contact-container">
        <div class="contact-form-container">
          <form action="https://formspree.io/f/xkgqybrb" method="POST">
            <h3>Get In Touch</h3>
            <div class="inputBox">
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Your Name"
                required
              />
              <input
                type="email"
                id="email"
                name="email_id"
                placeholder="Your Email"
                required
              />
            </div>
            <div class="inputBox">
              <input
                type="number"
                id="number"
                name="Mobile Number"
                placeholder="Your Number"
                required
              />
              <input
                type="text"
                id="subject"
                name="subject"
                placeholder="Subject"
                required
              />
            </div>
            <textarea
              placeholder="Your Message"
              name="message"
              id="message"
              required
              cols="30"
              rows="10"
            ></textarea>
            <input
              type="submit"
              value="Send Message"
              onclick="sendMail()"
              class="btn"
            />
          </form>
        </div>

        <div class="map-container">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d119064.32988343537!2d72.73988674335937!3d21.159242500000005!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3be04e59411d1563%3A0xfe4558290938b042!2sSurat%2C%20Gujarat!5e0!3m2!1sen!2sin!4v1725900547903!5m2!1sen!2sin"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="social">
        <a href="#"><i class="bx bxl-facebook-circle"></i></a>
        <a href="#"><i class="bx bxl-linkedin-square"></i></a>
        <a href="#"><i class="bx bxl-telegram"></i></a>
        <a href="#"><i class="bx bxl-instagram"></i></a>
      </div>
      <ul class="list">
        <li><a href="index.html#home">Home</a></li>
        <li><a href="index.html#rent">Rent</a></li>
        <li><a href="index.html#services">Services</a></li>
        <li><a href="index.html#ride">Ride</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="privacy.html">Terms & Condition</a></li>
      </ul>
      <p class="copyright">@ PrimeRides | All Rights Reserved</p>
    </footer>

    <script src="https://unpkg.com/scrollreveal"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
    <script src="main.js"></script>
  </body>
</html>
